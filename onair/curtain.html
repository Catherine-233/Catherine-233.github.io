<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>更真实的幕布拉开效果</title>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #fff;
      /* cursor: none; 移除全局隐藏鼠标指针 */
    }

    .curtain-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .curtain {
      position: absolute;
      top: 0;
      width: 100vw;
      height: 100vh;
      z-index: 2;
      pointer-events: none;
      display: flex;
    }

    .curtain-col {
      height: 100vh;
      min-width: 0;
      box-sizing: border-box;
      transition: all 2.2s cubic-bezier(.77, 0, .18, 1);
      box-shadow: 2px 0 12px 0 rgba(80, 0, 0, 0.18) inset, -2px 0 8px 0 rgba(255, 255, 255, 0.08) inset;
      position: relative;
      width: calc(100% / 36);
    }

    /* 渐变和高光，方向随机但都是上红下黑 */
    .curtain-col:nth-child(6n+1) {
      background: linear-gradient(180deg, #D0101B 60%, #111 100%);
    }

    .curtain-col:nth-child(6n+2) {
      background: linear-gradient(170deg, #b80e18 60%, #111 100%);
    }

    .curtain-col:nth-child(6n+3) {
      background: linear-gradient(190deg, #e23a47 60%, #111 100%);
    }

    .curtain-col:nth-child(6n+4) {
      background: linear-gradient(175deg, #c91c2a 60%, #111 100%);
    }

    .curtain-col:nth-child(6n+5) {
      background: linear-gradient(185deg, #a90c16 60%, #111 100%);
    }

    .curtain-col:nth-child(6n) {
      background: linear-gradient(160deg, #d94d5c 60%, #111 100%);
    }

    /* 拉开时动画，左右分开 */
    .curtain.open .curtain-col.left {
      transform: translateX(-120vw) skewY(-2deg) scaleY(1.05);
      width: 6px !important;
      opacity: 0.85;
      filter: brightness(0.95);
    }

    .curtain.open .curtain-col.right {
      transform: translateX(120vw) skewY(2deg) scaleY(1.05);
      width: 6px !important;
      opacity: 0.85;
      filter: brightness(0.95);
    }

    .curtain.open {
      transition: none;
      pointer-events: none;
    }

    .curtain-content {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 2.5rem;
      background: url('your-bg.jpg') center/cover no-repeat;
    }

    .ticket {
      position: absolute;
      left: 50%;
      top: 80%;
      transform: translate(-50%, -50%);
      z-index: 3;
      background: #fff;
      color: #D0101B;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.22), 0 0 0 12px #fff inset;
      width: 50vw;
      height: calc(50vw * 9 / 16);
      max-width: 400px;
      max-height: 225px;
      min-width: 180px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', Courier, monospace;
      letter-spacing: 1.5px;
      background: repeating-linear-gradient(135deg, #fff, #fff 10px, #e5e5e5 10px, #e5e5e5 20px);
      position: relative;
      overflow: hidden;
    }

    .open-btn {
      position: static;
      margin-top: 8px;
      padding: 12px 32px;
      font-size: 1.1rem;
      background: #D0101B;
      color: #fff;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
      transition: background 0.2s;
      font-family: inherit;
      letter-spacing: 1px;
    }

    .open-btn:hover {
      background: #a90c16;
    }

    @keyframes cursor-blink {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }

      100% {
        opacity: 1;
      }
    }

    #cursor-light {
      position: fixed;
      left: 0;
      top: 0;
      width: 80px;
      height: 80px;
      pointer-events: none;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 1) 0%, rgb(255, 255, 255, 0.05) 60%, rgb(255, 255, 255, 0) 0%);
      transform: translate(-50%, -50%);
      z-index: 10000;
      transition: background 0.2s;
      mix-blend-mode: lighten;
      animation: cursor-blink 2.4s infinite;
      display: none;
    }

    .ticket-leave {
      animation: ticketDownFade 0.4s forwards;
    }

    @keyframes ticketDownFade {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%);
      }

      80% {
        opacity: 0.2;
        transform: translate(-50%, 40%);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, 80%);
      }
    }

    .screen {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 90vw;
      height: 90vh;
      max-width: 100vw;
      max-height: 100vh;
      min-width: 240px;
      min-height: 180px;
      background: #fff;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.25);
      border-radius: 18px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2s;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screen.show {
      opacity: 1;
      pointer-events: auto;
    }

    .screen-content {
      color: #222;
      padding: 40px 32px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="curtain-container">
    <div class="curtain" id="curtain">
      <!-- 幕布条由JS自动生成 -->
    </div>
    <div class="curtain-content">
    </div>
    <div class="ticket">
      <div style="font-size:0.95rem; color:#222; margin-bottom:4px; letter-spacing:2px;">You got a ticket!</div>
      <hr style="width:80%;border:none;border-top:1.5px solid #222;margin:8px auto 12px auto;">
      <button class="open-btn" onclick="openCurtain()">Start the show</button>
      <br>
      <div id="ticket-date" style="font-size:0.85rem; color:#222; margin-top:4px;"></div>
    </div>
    <div id="cursor-light"></div>
    <div class="screen" id="screen">
      <div class="screen-content">
        <h2>Hi, I'm Xinyue Jiang</h2>
        <h3>A project manager and designer based in Shanghai</h3>
        <p>
          I connect technologies with end users
        </p>
      </div>
    </div>
  </div>
  <script>
    // 自动生成36个幕布条，前18个left，后18个right
    const curtain = document.getElementById('curtain');
    for (let i = 0; i < 36; i++) {
      const div = document.createElement('div');
      div.className = 'curtain-col ' + (i < 18 ? 'left' : 'right');
      curtain.appendChild(div);
    }
    // 光点跟随鼠标
    const cursorLight = document.getElementById('cursor-light');
    document.addEventListener('mousemove', function (e) {
      cursorLight.style.left = e.clientX + 'px';
      cursorLight.style.top = e.clientY + 'px';
    });
    function openCurtain() {
      document.getElementById('curtain').classList.add('open');
      document.querySelector('.open-btn').style.display = 'none';
      document.getElementById('cursor-light').style.display = 'block';
      document.body.style.cursor = 'none'; // 只在拉开后隐藏原生鼠标指针
      // 票据下移并消失
      const ticket = document.querySelector('.ticket');
      ticket.classList.add('ticket-leave');
      setTimeout(() => {
        ticket.style.display = 'none';
      }, 400);
      setTimeout(() => {
        document.getElementById('screen').classList.add('show');
      }, 2200); // 幕布动画时长一致
    }
    // 如果你想页面自动拉开，可以取消注释下面一行
    // window.onload = openCurtain;
    // 设置票据日期
    const ticketDate = document.getElementById('ticket-date');
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');
    ticketDate.textContent = `CINEMA ${yyyy}-${mm}-${dd}`;
  </script>
</body>

</html>
